<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DinoWeb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Brand Header -->
        <div class="brand-header">
            <span class="logo-text">DinoWeb</span>
        </div>

        <div class="score-board">
            <div class="score-box">SCORE: <span id="current-score">0</span></div>
            <div class="score-box">HIGH: <span id="high-score">0</span></div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="250"></canvas>
            <div class="controls-overlay" id="overlay">
                <h1 id="overlay-text">DINOWEB</h1>
                <button id="start-btn">START GAME</button>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div class="mobile-controls">
            <button class="nav-btn" id="btn-jump">JUMP (SPACE / ▲)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
